# Memoring — offline-first reminder app.
# Run: flutter pub get && flutter run
name: memoring
description: Type a reminder in plain text; Memoring figures out when and fires a full-screen alert.
publish_to: "none"
version: 1.0.1+3

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  # State management
  flutter_riverpod: ^2.5.1
  # Navigation
  go_router: ^14.2.0
  # Notifications (full-screen intent + sound)
  flutter_local_notifications: ^17.2.1
  # Timezone-correct scheduling (DST-safe)
  timezone: ^0.9.4
  # Stable, non-guessable ids
  uuid: ^4.4.0
  # iOS-style icon font (bundled by Flutter's default template; needed by the
  # icon tree-shaker even though the UI uses Material icons)
  cupertino_icons: ^1.0.8
  # Photo attachments
  image_picker: ^1.1.2
  # On-device persistence (JSON file) + image storage location
  path_provider: ^2.1.4
  # Offline prayer-time calculation (no network, no location service needed)
  adhan: ^2.0.0
  # Voice input — speak a reminder instead of typing
  speech_to_text: ^7.0.0
  # On-device photo labeling (mosque / prayer-mat check) — offline, best-effort
  google_mlkit_image_labeling: ^0.13.0
  # On-device face detection — a selfie must contain a real face to stop the alarm
  google_mlkit_face_detection: ^0.12.0
  # Monetization — AdMob banners (test IDs until a real AdMob account exists).
  # No-fill/offline/Huawei (no Google services) → banner simply doesn't render.
  google_mobile_ads: ^9.0.0
  # Monetization on Huawei devices (no Google services) — Petal/Huawei Ads Kit.
  # Only attempted after AdMob reports unavailable, so devices never double-serve.
  huawei_ads: ^13.4.65+300
  # Up-front permission requests during onboarding (camera, mic)
  permission_handler: ^11.3.0
  # SHA-256 for the local app-lock PIN (pure Dart, no native code)
  crypto: ^3.0.3
  # Backend telemetry / feedback / announcements over plain HTTPS (Supabase REST)
  # — works on every device including Huawei (no Google services needed).
  http: ^1.2.0
  # Opens the store link on the force-update screen
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  very_good_analysis: ^6.0.0
  # Generates launcher icons from assets/brand (config in flutter_launcher_icons-*.yaml)
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
