# Builds an installable Android APK in the cloud on every push (and on demand).
# Download it from the run's "Artifacts" section → memoring-apk → app-release.apk.
name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      # The android/ folder isn't committed; generate it (and only it) here.
      - name: Generate Android platform files
        run: flutter create --platforms=android --project-name memoring .

      # Remove the default counter-app widget test that `flutter create` adds,
      # since it references a template app we don't have.
      - name: Remove template test
        run: rm -f test/widget_test.dart

      # flutter_local_notifications requires Java 8+ API desugaring. Patch the
      # generated app Gradle file (handles both Kotlin DSL and Groovy).
      - name: Enable core library desugaring
        run: |
          set -e
          KTS=android/app/build.gradle.kts
          GROOVY=android/app/build.gradle
          if [ -f "$KTS" ]; then
            sed -i 's/compileOptions {/compileOptions {\n        isCoreLibraryDesugaringEnabled = true/' "$KTS"
            printf '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n' >> "$KTS"
            echo "patched $KTS"; tail -6 "$KTS"
          elif [ -f "$GROOVY" ]; then
            sed -i 's/compileOptions {/compileOptions {\n        coreLibraryDesugaringEnabled true/' "$GROOVY"
            printf '\ndependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"\n}\n' >> "$GROOVY"
            echo "patched $GROOVY"; tail -6 "$GROOVY"
          else
            echo "No app Gradle file found"; exit 1
          fi

      # R8 shrinking mangles flutter_local_notifications' Gson types ("Missing
      # type parameter"), breaking scheduling. Disable minify/shrink for release
      # and add keep rules as a belt-and-suspenders safeguard.
      - name: Harden release build (R8 / Gson)
        run: |
          set -e
          cp ci/proguard-rules.pro android/app/proguard-rules.pro
          KTS=android/app/build.gradle.kts
          GROOVY=android/app/build.gradle
          if [ -f "$KTS" ]; then
            sed -i 's/release {/release {\n            isMinifyEnabled = false\n            isShrinkResources = false\n            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")/' "$KTS"
            echo "patched $KTS"; sed -n '/buildTypes/,/^}/p' "$KTS"
          elif [ -f "$GROOVY" ]; then
            sed -i 's/release {/release {\n            minifyEnabled false\n            shrinkResources false\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"/' "$GROOVY"
            echo "patched $GROOVY"
          fi

      # Replace the default manifest with one that enables full-screen alerts,
      # exact alarms, and reboot rescheduling.
      - name: Apply full-screen-alert manifest
        run: |
          cp ci/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          echo "applied manifest:"; cat android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons -f icons-android.yaml

      - name: Analyze (non-blocking)
        run: flutter analyze
        continue-on-error: true

      - name: Run all tests (unit + widget, non-blocking)
        run: flutter test
        continue-on-error: true

      # Real release signing for the Play Store. Add these repo secrets to enable:
      #   MEMORING_KEYSTORE_BASE64 (base64 of the .jks), MEMORING_KEYSTORE_PASSWORD,
      #   MEMORING_KEY_ALIAS, MEMORING_KEY_PASSWORD.
      # Without them the build stays test-signed (fine for personal installs,
      # NOT accepted by Google Play).
      - name: Configure release signing (if secrets present)
        env:
          KS_B64: ${{ secrets.MEMORING_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.MEMORING_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MEMORING_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.MEMORING_KEY_PASSWORD }}
        run: |
          if [ -z "$KS_B64" ]; then
            echo "No keystore secrets — keeping test signing (not Play-uploadable)."
            exit 0
          fi
          echo "$KS_B64" | base64 -d > android/app/release.jks
          cat > android/key.properties <<EOF
          storeFile=release.jks
          storePassword=$KS_PASS
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASS
          EOF
          KTS=android/app/build.gradle.kts
          python3 - "$KTS" <<'PY'
          import re, sys
          p = sys.argv[1]
          s = open(p).read()
          # `java` is shadowed by Gradle's extension inside .kts — import instead.
          if 'import java.util.Properties' not in s:
              s = 'import java.util.Properties\n' + s
          s = s.replace('android {', '''val keystoreProperties = Properties().apply {
              val f = rootProject.file("key.properties")
              if (f.exists()) f.inputStream().use { load(it) }
          }
          android {''', 1) if 'key.properties' not in s else s
          s = s.replace('buildTypes {', '''signingConfigs {
                  create("release") {
                      storeFile = file(keystoreProperties.getProperty("storeFile") ?: "release.jks")
                      storePassword = keystoreProperties.getProperty("storePassword")
                      keyAlias = keystoreProperties.getProperty("keyAlias")
                      keyPassword = keystoreProperties.getProperty("keyPassword")
                  }
              }
              buildTypes {''', 1)
          s = s.replace('signingConfig = signingConfigs.getByName("debug")',
                        'signingConfig = signingConfigs.getByName("release")')
          open(p, 'w').write(s)
          PY
          echo "Release signing configured."

      # Split per CPU architecture — a universal APK ships 3 copies of every
      # native library; each phone needs exactly one. Also strip Dart debug
      # symbols out of the binary (kept as a build artifact if ever needed).
      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi --split-debug-info=build/symbols

      # Google Play only accepts App Bundles for new apps. The AAB lets Play
      # serve each user only their device's slice automatically.
      - name: Build release AAB (Play Store)
        run: flutter build appbundle --release --split-debug-info=build/symbols

      - name: Upload APK (64-bit — all modern phones)
        uses: actions/upload-artifact@v4
        with:
          name: memoring-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload APK (32-bit — very old phones)
        uses: actions/upload-artifact@v4
        with:
          name: memoring-apk-32bit
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: memoring-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
