# Builds an installable Android APK in the cloud on every push (and on demand).
# Download it from the run's "Artifacts" section → memoring-apk → app-release.apk.
name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version

      # The android/ folder isn't committed; generate it (and only it) here.
      - name: Generate Android platform files
        run: flutter create --platforms=android --project-name memoring .

      # Remove the default counter-app widget test that `flutter create` adds,
      # since it references a template app we don't have.
      - name: Remove template test
        run: rm -f test/widget_test.dart

      # flutter_local_notifications requires Java 8+ API desugaring. Patch the
      # generated app Gradle file (handles both Kotlin DSL and Groovy).
      - name: Enable core library desugaring
        run: |
          set -e
          KTS=android/app/build.gradle.kts
          GROOVY=android/app/build.gradle
          if [ -f "$KTS" ]; then
            sed -i 's/compileOptions {/compileOptions {\n        isCoreLibraryDesugaringEnabled = true/' "$KTS"
            printf '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n' >> "$KTS"
            echo "patched $KTS"; tail -6 "$KTS"
          elif [ -f "$GROOVY" ]; then
            sed -i 's/compileOptions {/compileOptions {\n        coreLibraryDesugaringEnabled true/' "$GROOVY"
            printf '\ndependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"\n}\n' >> "$GROOVY"
            echo "patched $GROOVY"; tail -6 "$GROOVY"
          else
            echo "No app Gradle file found"; exit 1
          fi

      # R8 shrinking mangles flutter_local_notifications' Gson types ("Missing
      # type parameter"), breaking scheduling. Disable minify/shrink for release
      # and add keep rules as a belt-and-suspenders safeguard.
      - name: Harden release build (R8 / Gson)
        run: |
          set -e
          cp ci/proguard-rules.pro android/app/proguard-rules.pro
          KTS=android/app/build.gradle.kts
          GROOVY=android/app/build.gradle
          if [ -f "$KTS" ]; then
            sed -i 's/release {/release {\n            isMinifyEnabled = false\n            isShrinkResources = false\n            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")/' "$KTS"
            echo "patched $KTS"; sed -n '/buildTypes/,/^}/p' "$KTS"
          elif [ -f "$GROOVY" ]; then
            sed -i 's/release {/release {\n            minifyEnabled false\n            shrinkResources false\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"/' "$GROOVY"
            echo "patched $GROOVY"
          fi

      # Replace the default manifest with one that enables full-screen alerts,
      # exact alarms, and reboot rescheduling.
      - name: Apply full-screen-alert manifest
        run: |
          cp ci/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          echo "applied manifest:"; cat android/app/src/main/AndroidManifest.xml

      # Some plugins (e.g. flutter_timezone) compile Kotlin at an older JVM
      # target than Java, which newer Gradle rejects. A global init script aligns
      # every module to JVM 17 — DSL-agnostic, no edits to generated files.
      - name: Align Kotlin JVM target
        run: |
          mkdir -p ~/.gradle/init.d
          printf '%s\n' \
            'allprojects {' \
            '  afterEvaluate { project ->' \
            '    if (project.hasProperty("android")) {' \
            '      project.android {' \
            '        compileOptions {' \
            '          sourceCompatibility JavaVersion.VERSION_17' \
            '          targetCompatibility JavaVersion.VERSION_17' \
            '        }' \
            '      }' \
            '    }' \
            '    project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {' \
            '      kotlinOptions { jvmTarget = "17" }' \
            '    }' \
            '  }' \
            '}' > ~/.gradle/init.d/jvm.gradle
          cat ~/.gradle/init.d/jvm.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (non-blocking)
        run: flutter analyze
        continue-on-error: true

      - name: Run all tests (unit + widget, non-blocking)
        run: flutter test
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: memoring-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
