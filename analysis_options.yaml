# Strict lints — `flutter analyze` must be clean (CLAUDE.md §6).
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Treat missing returns / dead code as errors, not warnings.
    dead_code: error
    unused_import: error

linter:
  rules:
    public_member_api_docs: false # docs required on domain APIs; relaxed on widgets
    prefer_const_constructors: true
    avoid_print: true
